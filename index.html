<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Word Match Game</title>
<link href="https://fonts.googleapis.com/css2?family=OpenDyslexic&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --primary: #4F7EF7;
    --secondary: #38C9A8;
    --purple: #A78BFA;
    --green: #22C55E;
    --orange: #F59E0B;
    --card-radius: 18px;
    --shadow: 0 6px 20px rgba(0,0,0,0.10);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lexend', sans-serif;
    background: #F4F6FB;
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed; width: 11px; height: 11px; top: -20px;
    animation: confettiFall 3s linear forwards;
    border-radius: 2px; z-index: 1000; pointer-events: none;
  }
  @keyframes confettiFall { to { transform: translateY(110vh) rotate(720deg); opacity: 0; } }

  /* ── SETUP ───────────────────────────────────── */
  #setup {
    display: flex; flex-direction: column; align-items: center;
    padding: 36px 20px 40px; min-height: 100vh;
    background: linear-gradient(135deg, #EEF2FF 0%, #F0FDF4 60%, #FFF7ED 100%);
  }

  #setup h1 {
    font-size: clamp(2rem, 5vw, 3rem); font-weight: 700;
    color: #1E293B; margin-bottom: 28px; text-align: center;
  }

  .setup-card {
    background: white; border-radius: 24px; padding: 28px;
    width: 100%; max-width: 640px; box-shadow: var(--shadow); margin-bottom: 18px;
  }

  .setup-card h2 {
    font-size: 1.15rem; font-weight: 700; color: #334155;
    margin-bottom: 14px; display: flex; align-items: center; gap: 8px;
  }

  .setup-card .hint-text {
    font-size: 0.88rem; color: #94A3B8;
    margin-top: -8px; margin-bottom: 14px; line-height: 1.5;
  }

  .grid-options { display: flex; flex-wrap: wrap; gap: 10px; }

  .grid-btn {
    border: 2.5px solid #E2E8F0; background: white; border-radius: 14px;
    padding: 12px 18px; cursor: pointer; font-family: 'Lexend', sans-serif;
    font-size: 0.95rem; font-weight: 600; color: #64748B; transition: all 0.2s;
    display: flex; flex-direction: column; align-items: center; gap: 3px; min-width: 84px;
  }
  .grid-btn small { font-size: 0.78rem; font-weight: 400; color: #94A3B8; }
  .grid-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: scale(1.04); }
  .grid-btn.active { border-color: var(--secondary); background: #F0FDF8; color: var(--secondary); }

  .word-entry-area { display: flex; gap: 10px; margin-bottom: 12px; }

  .word-entry-area input {
    flex: 1; border: 2.5px solid #E2E8F0; border-radius: 12px;
    padding: 13px 16px; font-size: 1.05rem; font-family: 'Lexend', sans-serif;
    outline: none; transition: border-color 0.2s; color: #1E293B;
  }
  .word-entry-area input:focus { border-color: var(--primary); }

  .add-btn {
    background: var(--primary); color: white; border: none; border-radius: 12px;
    padding: 13px 22px; font-size: 1.3rem; cursor: pointer;
    transition: transform 0.15s, background 0.2s; font-weight: 700;
  }
  .add-btn:hover { transform: scale(1.08); background: #3b6ee8; }

  .words-display { display: flex; flex-wrap: wrap; gap: 8px; min-height: 40px; }

  .word-chip {
    background: linear-gradient(135deg, #4F7EF7, #6B5BFC); color: white;
    border-radius: 50px; padding: 7px 14px; font-size: 0.95rem; font-weight: 600;
    display: flex; align-items: center; gap: 7px; animation: popIn 0.2s ease;
  }
  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .word-chip button {
    background: rgba(255,255,255,0.25); border: none; border-radius: 50%;
    width: 20px; height: 20px; color: white; cursor: pointer; font-size: 0.8rem;
    display: flex; align-items: center; justify-content: center;
  }
  .word-chip button:hover { background: rgba(255,255,255,0.45); }

  .word-count-hint { font-size: 0.88rem; color: #94A3B8; margin-top: 10px; }
  .word-count-hint span { color: var(--primary); font-weight: 700; }

  .font-toggle { display: flex; gap: 10px; }

  .font-btn {
    flex: 1; border: 2.5px solid #E2E8F0; background: white; border-radius: 12px;
    padding: 13px; cursor: pointer; font-size: 0.95rem; font-weight: 600;
    color: #64748B; transition: all 0.2s; font-family: 'Lexend', sans-serif;
  }
  .font-btn:hover { border-color: var(--purple); }
  .font-btn.active { border-color: var(--purple); background: #F5F3FF; color: var(--purple); }
  .font-btn.dyslexic { font-family: 'OpenDyslexic', sans-serif; font-size: 0.85rem; }

  .start-btn {
    background: linear-gradient(135deg, #38C9A8, #4F7EF7); color: white;
    border: none; border-radius: 20px; padding: 20px 56px; font-size: 1.35rem;
    font-weight: 700; font-family: 'Lexend', sans-serif; cursor: pointer;
    box-shadow: 0 8px 24px rgba(79,126,247,0.35);
    transition: transform 0.2s, box-shadow 0.2s; margin-top: 8px;
  }
  .start-btn:hover { transform: translateY(-3px) scale(1.03); }
  .start-btn:disabled { background: #CBD5E1; box-shadow: none; cursor: not-allowed; transform: none; }

  /* ── GAME ────────────────────────────────────── */
  #game {
    display: none; flex-direction: column; min-height: 100vh; padding: 14px;
    background: linear-gradient(180deg, #EEF2FF 0%, #F4F6FB 100%);
  }

  .game-header {
    display: flex; align-items: center; justify-content: space-between;
    margin-bottom: 14px; flex-wrap: wrap; gap: 8px;
  }

  .game-title { font-size: 1.4rem; font-weight: 700; color: #1E293B; }

  .stats { display: flex; gap: 10px; align-items: center; }

  .stat-badge {
    background: white; border-radius: 50px; padding: 7px 16px;
    font-weight: 700; font-size: 0.95rem;
    box-shadow: 0 2px 8px rgba(0,0,0,0.07);
    display: flex; align-items: center; gap: 5px; color: #475569;
  }
  .stat-badge.matches { color: var(--green); }
  .stat-badge.flips   { color: var(--orange); }

  .back-btn {
    background: white; border: 2px solid #E2E8F0; border-radius: 50px;
    padding: 7px 16px; font-size: 0.9rem; font-weight: 600;
    font-family: 'Lexend', sans-serif; cursor: pointer; color: #64748B; transition: all 0.2s;
  }
  .back-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* ── CARD GRID ───────────────────────────────── */
  #card-grid {
    display: grid; gap: clamp(8px, 1.8vw, 14px);
    flex: 1; align-content: start;
    max-width: 920px; margin: 0 auto; width: 100%;
    padding-bottom: 120px; /* always leave room for bar */
  }

  .card { perspective: 1000px; cursor: pointer; aspect-ratio: 1 / 1.15; }

  .card-inner {
    width: 100%; height: 100%; position: relative;
    transform-style: preserve-3d;
    transition: transform 0.42s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--card-radius);
  }
  /* Cards start face-DOWN (not flipped) */
  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute; inset: 0; border-radius: var(--card-radius);
    backface-visibility: hidden; -webkit-backface-visibility: hidden;
    display: flex; align-items: center; justify-content: center;
    flex-direction: column; box-shadow: var(--shadow); user-select: none; overflow: hidden;
  }

  /* BACK = face-down side (colorful, shown first) */
  .card-back { background: #1E293B; color: white; }
  .card:nth-child(6n+1) .card-back { background: linear-gradient(135deg, #1E3A5F, #2563EB); }
  .card:nth-child(6n+2) .card-back { background: linear-gradient(135deg, #134E2F, #16A34A); }
  .card:nth-child(6n+3) .card-back { background: linear-gradient(135deg, #4C1D95, #7C3AED); }
  .card:nth-child(6n+4) .card-back { background: linear-gradient(135deg, #7C2D12, #EA580C); }
  .card:nth-child(6n+5) .card-back { background: linear-gradient(135deg, #1E3A5F, #0891B2); }
  .card:nth-child(6n+0) .card-back { background: linear-gradient(135deg, #4A1942, #DB2777); }

  .card-back-inner {
    position: relative; width: 100%; height: 100%;
    display: flex; align-items: center; justify-content: center;
  }
  .card-back-inner::before {
    content: ''; position: absolute; inset: 0; opacity: 0.15;
    background-image:
      repeating-linear-gradient(45deg,  rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 1px, transparent 1px, transparent 14px),
      repeating-linear-gradient(-45deg, rgba(255,255,255,0.7) 0px, rgba(255,255,255,0.7) 1px, transparent 1px, transparent 14px);
  }
  .card-back-symbol {
    font-size: clamp(2rem, 7vw, 3.2rem); position: relative; z-index: 1;
    opacity: 0.9; color: white; filter: drop-shadow(0 2px 6px rgba(0,0,0,0.3));
  }

  /* FRONT = word side (shown after flip) */
  .card-front {
    background: white;
    transform: rotateY(180deg); /* starts hidden */
    padding: 8px;
  }

  .card-front .card-word {
    font-weight: 700; color: #1E293B; text-align: center;
    line-height: 1.15; padding: 0 6px; word-break: break-word;
  }
  .card-front .card-word.dyslexic-font { font-family: 'OpenDyslexic', sans-serif; }

  .card-front .card-word[data-len="1"],
  .card-front .card-word[data-len="2"],
  .card-front .card-word[data-len="3"] { font-size: clamp(3rem, 10vw, 5.5rem); }
  .card-front .card-word[data-len="4"],
  .card-front .card-word[data-len="5"] { font-size: clamp(2.4rem, 8vw, 4.5rem); }
  .card-front .card-word[data-len="6"],
  .card-front .card-word[data-len="7"] { font-size: clamp(1.8rem, 6vw, 3.5rem); }
  .card-front .card-word[data-len="8"],
  .card-front .card-word[data-len="9"] { font-size: clamp(1.4rem, 4.5vw, 2.8rem); }
  .card-front .card-word[data-len="10+"] { font-size: clamp(1.1rem, 3.5vw, 2rem); }

  /* Matched = locked green */
  .card.matched .card-front { background: linear-gradient(135deg, #F0FDF4, #DCFCE7); border: 3px solid var(--green); }
  .card.matched .card-inner { animation: matchPop 0.4s ease; }
  @keyframes matchPop {
    0%   { transform: rotateY(180deg) scale(1); }
    50%  { transform: rotateY(180deg) scale(1.1); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* Pending = orange glow while waiting for teacher decision */
  .card.pending .card-front { border: 3px solid var(--orange); background: #FFFBEB; }

  /* ── MATCH BAR ───────────────────────────────── */
  #match-bar {
    display: none;
    position: fixed; bottom: 0; left: 0; right: 0; z-index: 400;
    background: white; box-shadow: 0 -4px 30px rgba(0,0,0,0.15);
    padding: 18px 24px; align-items: center; justify-content: center;
    gap: 16px; flex-wrap: wrap;
    border-top: 3px solid var(--orange);
  }
  #match-bar.show { display: flex; }

  .bar-label {
    font-size: 1.15rem; font-weight: 700; color: #334155;
    flex-basis: 100%; text-align: center;
  }

  .bar-btn {
    border: none; border-radius: 16px; padding: 18px 36px;
    font-size: 1.15rem; font-weight: 700; font-family: 'Lexend', sans-serif;
    cursor: pointer; transition: transform 0.15s, box-shadow 0.15s;
    min-width: 200px;
  }
  .bar-btn:hover  { transform: scale(1.04); }
  .bar-btn:active { transform: scale(0.97); }

  .bar-btn.yes {
    background: linear-gradient(135deg, #22C55E, #16A34A);
    color: white; font-size: 1.25rem;
    box-shadow: 0 6px 20px rgba(34,197,94,0.4);
  }
  .bar-btn.no {
    background: #FEF2F2; color: #DC2626;
    border: 2.5px solid #FCA5A5; font-size: 1.25rem;
  }

  /* ── WIN OVERLAY ─────────────────────────────── */
  #win-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.55); backdrop-filter: blur(4px);
    z-index: 500; align-items: center; justify-content: center;
  }
  #win-overlay.show { display: flex; }

  .win-card {
    background: white; border-radius: 30px; padding: 46px 38px;
    text-align: center; max-width: 400px; width: 90%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.25);
    animation: winPop 0.45s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes winPop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .win-emoji  { font-size: 4.5rem; margin-bottom: 8px; display: block; }
  .win-title  { font-size: 2.2rem; font-weight: 700; color: #1E293B; margin-bottom: 6px; }
  .win-sub    { font-size: 1.1rem; color: #94A3B8; margin-bottom: 22px; }
  .win-stats  { display: flex; gap: 14px; justify-content: center; margin-bottom: 26px; }

  .win-stat {
    background: #F8FAFC; border-radius: 14px; padding: 12px 18px;
    font-weight: 700; font-size: 1.05rem; color: #1E293B;
  }
  .win-stat span { font-size: 0.8rem; font-weight: 400; color: #94A3B8; display: block; }

  .win-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }

  .win-btn {
    border: none; border-radius: 14px; padding: 14px 26px;
    font-size: 1rem; font-weight: 700; font-family: 'Lexend', sans-serif;
    cursor: pointer; transition: transform 0.15s;
  }
  .win-btn:hover { transform: scale(1.05); }
  .win-btn.replay { background: linear-gradient(135deg, #38C9A8, #4F7EF7); color: white; }
  .win-btn.new    { background: #F1F5F9; color: #475569; border: 2px solid #E2E8F0; }
</style>
</head>
<body>

<!-- ══ SETUP ═════════════════════════════════════════════ -->
<div id="setup">
  <h1>Word Match</h1>

  <div class="setup-card">
    <h2>🔢 Number of cards</h2>
    <div class="grid-options">
      <button class="grid-btn active" data-pairs="4" data-cols="4"><span>4 × 2</span><small>8 cards</small></button>
      <button class="grid-btn" data-pairs="6" data-cols="4"><span>3 × 4</span><small>12 cards</small></button>
      <button class="grid-btn" data-pairs="8" data-cols="4"><span>4 × 4</span><small>16 cards</small></button>
      <button class="grid-btn" data-pairs="10" data-cols="5"><span>4 × 5</span><small>20 cards</small></button>
      <button class="grid-btn" data-pairs="12" data-cols="6"><span>4 × 6</span><small>24 cards</small></button>
    </div>
  </div>

  <div class="setup-card">
    <h2>🔤 Font</h2>
    <div class="font-toggle">
      <button class="font-btn active" data-font="lexend">Lexend</button>
      <button class="font-btn dyslexic" data-font="dyslexic">OpenDyslexic</button>
    </div>
  </div>

  <div class="setup-card">
    <h2>✏️ Words</h2>
    <p class="hint-text">Type each word for a card and press +. You decide what counts as a match during the game.</p>
    <div class="word-entry-area">
      <input type="text" id="wordInput" placeholder="Type a word…" maxlength="24"
             autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="add-btn" id="addWordBtn">+</button>
    </div>
    <div class="words-display" id="wordsDisplay"></div>
    <p class="word-count-hint">
      Need <span id="wordsNeeded">4</span> cards for this grid. You have <span id="wordsHave">0</span>.
    </p>
  </div>

  <button class="start-btn" id="startBtn" disabled>Start Game</button>
</div>

<!-- ══ GAME ══════════════════════════════════════════════ -->
<div id="game">
  <div class="game-header">
    <div class="game-title">Word Match</div>
    <div class="stats">
      <div class="stat-badge matches">✓ <span id="matchCount">0</span> matched</div>
      <div class="stat-badge flips">↺ <span id="flipCount">0</span> flips</div>
    </div>
    <button class="back-btn" id="backBtn">⚙ Setup</button>
  </div>
  <div id="card-grid"></div>
</div>

<!-- ══ MATCH BAR ═════════════════════════════════════════ -->
<div id="match-bar">
  <div class="bar-label">Is this a match?</div>
  <button class="bar-btn yes" id="confirmMatchBtn">✓ &nbsp;Yes — Match!</button>
  <button class="bar-btn no"  id="denyMatchBtn">✗ &nbsp;Not a Match</button>
</div>

<!-- ══ WIN OVERLAY ═══════════════════════════════════════ -->
<div id="win-overlay">
  <div class="win-card">
    <span class="win-emoji">🏆</span>
    <div class="win-title">Well done!</div>
    <div class="win-sub">All matches found!</div>
    <div class="win-stats">
      <div class="win-stat"><span>Flips</span><span id="finalFlips">0</span></div>
      <div class="win-stat"><span>Matches</span><span id="finalMatches">0</span></div>
    </div>
    <div class="win-btns">
      <button class="win-btn replay" id="replayBtn">↺ Play Again</button>
      <button class="win-btn new"    id="newGameBtn">⚙ New Game</button>
    </div>
  </div>
</div>

<script>
const BACK_SYMBOLS = ['◈','⬡','⧫','△','◉','⬢','✦','⊕','⟁','⌘','⬟','⬠','⟐','⊞','⊗','⌖','⊙','⬧','⧉','⊛','⟡','⬭','⧖','⊜','⊝'];

// ── State ─────────────────────────────────────────────────────────────────
let words         = [];
let selectedPairs = 4;
let selectedCols  = 4;
let selectedFont  = 'lexend';
let flippedCards  = [];   // cards currently face-up (max 2)
let pendingPair   = null; // [a, b] waiting for teacher decision
let matchedPairs  = 0;
let totalPairs    = 0;    // teacher sets this at game start via the grid size / 2
let flipCount     = 0;
let lockBoard     = false;
let gameWords     = [];

// ── Setup ─────────────────────────────────────────────────────────────────
document.querySelectorAll('.grid-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.grid-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPairs = +btn.dataset.pairs;
    selectedCols  = +btn.dataset.cols;
    updateHint(); validateStart();
  });
});

document.querySelectorAll('.font-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.font-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFont = btn.dataset.font;
  });
});

const wordInput    = document.getElementById('wordInput');
const wordsDisplay = document.getElementById('wordsDisplay');

function addWord() {
  const w = wordInput.value.trim();
  if (!w) { wordInput.value = ''; return; }
  words.push(w.toLowerCase());
  wordInput.value = '';
  renderChips(); updateHint(); validateStart();
  wordInput.focus();
}

document.getElementById('addWordBtn').addEventListener('click', addWord);
wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

function renderChips() {
  wordsDisplay.innerHTML = '';
  words.forEach((w, i) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.innerHTML = `${w} <button>✕</button>`;
    chip.querySelector('button').addEventListener('click', () => {
      words.splice(i, 1); renderChips(); updateHint(); validateStart();
    });
    wordsDisplay.appendChild(chip);
  });
}

function updateHint() {
  document.getElementById('wordsNeeded').textContent = selectedPairs;
  document.getElementById('wordsHave').textContent   = words.length;
}

function validateStart() {
  document.getElementById('startBtn').disabled = words.length < selectedPairs;
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ── Helpers ───────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

// ── Start ─────────────────────────────────────────────────────────────────
function startGame() {
  gameWords    = words.slice(0, selectedPairs);
  flipCount    = 0;
  matchedPairs = 0;
  // Total pairs = half the number of cards (teacher will pair them up)
  totalPairs   = Math.floor(selectedPairs / 2);
  flippedCards = [];
  pendingPair  = null;
  lockBoard    = false;

  document.getElementById('matchCount').textContent = 0;
  document.getElementById('flipCount').textContent  = 0;
  document.getElementById('win-overlay').classList.remove('show');
  hideBar();
  buildGrid();

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display  = 'flex';
}

// ── Build Grid ────────────────────────────────────────────────────────────
function buildGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';
  grid.style.gridTemplateColumns = `repeat(${selectedCols}, 1fr)`;

  const symbols = shuffle(BACK_SYMBOLS);
  let cardData  = gameWords.map((w, i) => ({ word: w, symbol: symbols[i % symbols.length] }));
  cardData = shuffle(cardData);

  cardData.forEach(data => {
    const card = document.createElement('div');
    card.className = 'card'; // NOT flipped — starts face-down

    const isDyslexic = selectedFont === 'dyslexic';
    const wordClass  = isDyslexic ? 'card-word dyslexic-font' : 'card-word';
    const lenKey     = data.word.length > 9 ? '10+' : String(data.word.length);

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="card-back-inner">
            <div class="card-back-symbol">${data.symbol}</div>
          </div>
        </div>
        <div class="card-front">
          <div class="${wordClass}" data-len="${lenKey}">${data.word}</div>
        </div>
      </div>`;

    card.addEventListener('click', () => onCardClick(card));
    grid.appendChild(card);
  });
}

// ── Card Click ────────────────────────────────────────────────────────────
function onCardClick(card) {
  if (lockBoard) return;
  if (card.classList.contains('matched')) return;
  if (pendingPair) return; // waiting for teacher decision

  // Tap a face-up unmatched card = flip it back down
  if (card.classList.contains('flipped')) {
    card.classList.remove('flipped');
    flippedCards = flippedCards.filter(c => c !== card);
    return;
  }

  // Flip card face-up
  card.classList.add('flipped');
  flipCount++;
  document.getElementById('flipCount').textContent = flipCount;
  flippedCards.push(card);

  // Once 2 cards are face-up, ask teacher if it's a match
  if (flippedCards.length === 2) {
    lockBoard   = true;
    pendingPair = [...flippedCards];
    flippedCards = [];

    pendingPair.forEach(c => c.classList.add('pending'));

    setTimeout(() => {
      lockBoard = false;
      showBar();
    }, 400);
  }
}

// ── Match Bar ─────────────────────────────────────────────────────────────
function showBar() {
  document.getElementById('match-bar').classList.add('show');
}

function hideBar() {
  document.getElementById('match-bar').classList.remove('show');
}

// ✓ Teacher confirms match
document.getElementById('confirmMatchBtn').addEventListener('click', () => {
  if (!pendingPair) return;
  const [a, b] = pendingPair;
  pendingPair = null;
  a.classList.remove('pending');
  b.classList.remove('pending');
  a.classList.add('matched');
  b.classList.add('matched');
  matchedPairs++;
  document.getElementById('matchCount').textContent = matchedPairs;
  hideBar();
  if (matchedPairs === totalPairs) showWin();
});

// ✗ Teacher says not a match — flip both back down
document.getElementById('denyMatchBtn').addEventListener('click', () => {
  if (!pendingPair) return;
  const [a, b] = pendingPair;
  pendingPair = null;
  a.classList.remove('pending');
  b.classList.remove('pending');
  a.classList.remove('flipped');
  b.classList.remove('flipped');
  hideBar();
});

// ── Win ───────────────────────────────────────────────────────────────────
function showWin() {
  document.getElementById('finalFlips').textContent   = flipCount;
  document.getElementById('finalMatches').textContent = matchedPairs;
  document.getElementById('win-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#4F7EF7','#38C9A8','#F59E0B','#A78BFA','#22C55E','#EF4444'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const p = document.createElement('div');
      p.className = 'confetti-piece';
      p.style.left = Math.random() * 100 + 'vw';
      p.style.background = colors[Math.floor(Math.random() * colors.length)];
      p.style.animationDuration = (2 + Math.random() * 2) + 's';
      p.style.animationDelay = Math.random() * 0.5 + 's';
      p.style.transform = `rotate(${Math.random()*360}deg)`;
      if (Math.random() > 0.5) p.style.borderRadius = '50%';
      document.body.appendChild(p);
      setTimeout(() => p.remove(), 4000);
    }, i * 30);
  }
}

// ── Nav ───────────────────────────────────────────────────────────────────
document.getElementById('backBtn').addEventListener('click', () => {
  hideBar();
  document.getElementById('game').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
});

document.getElementById('replayBtn').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  startGame();
});

document.getElementById('newGameBtn').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('game').style.display  = 'none';
  document.getElementById('setup').style.display = 'flex';
});

updateHint();
</script>
