<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>🌟 Word Match Game</title>
<link href="https://fonts.googleapis.com/css2?family=OpenDyslexic&family=Lexend:wght@400;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #FFF8F0;
    --primary: #FF6B6B;
    --secondary: #4ECDC4;
    --accent: #FFE66D;
    --purple: #A78BFA;
    --green: #6BCB77;
    --orange: #FF9F43;
    --card-back: #FF6B6B;
    --card-radius: 20px;
    --shadow: 0 8px 24px rgba(0,0,0,0.12);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    font-family: 'Lexend', sans-serif;
    background: var(--bg);
    min-height: 100vh;
    overflow-x: hidden;
  }

  /* Confetti */
  .confetti-piece {
    position: fixed;
    width: 12px; height: 12px;
    top: -20px;
    animation: confettiFall 3s linear forwards;
    border-radius: 2px;
    z-index: 1000;
    pointer-events: none;
  }
  @keyframes confettiFall {
    to { transform: translateY(110vh) rotate(720deg); opacity: 0; }
  }

  /* SETUP SCREEN */
  #setup {
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 30px 20px;
    min-height: 100vh;
    background: linear-gradient(135deg, #FFE5E5 0%, #E5F4FF 50%, #E5FFE5 100%);
  }

  #setup h1 {
    font-size: clamp(2rem, 5vw, 3.5rem);
    font-weight: 700;
    color: #333;
    margin-bottom: 6px;
    text-align: center;
  }

  #setup .subtitle {
    font-size: 1.1rem;
    color: #888;
    margin-bottom: 30px;
  }

  .setup-card {
    background: white;
    border-radius: 28px;
    padding: 30px;
    width: 100%;
    max-width: 640px;
    box-shadow: var(--shadow);
    margin-bottom: 20px;
  }

  .setup-card h2 {
    font-size: 1.3rem;
    font-weight: 700;
    color: #444;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 8px;
  }

  /* Grid picker */
  .grid-options {
    display: flex;
    flex-wrap: wrap;
    gap: 12px;
  }

  .grid-btn {
    border: 3px solid #E0E0E0;
    background: white;
    border-radius: 16px;
    padding: 14px 20px;
    cursor: pointer;
    font-family: 'Lexend', sans-serif;
    font-size: 1rem;
    font-weight: 600;
    color: #555;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    min-width: 90px;
  }

  .grid-btn .grid-icon {
    font-size: 1.4rem;
  }

  .grid-btn:hover { border-color: var(--secondary); color: var(--secondary); transform: scale(1.05); }
  .grid-btn.active { border-color: var(--secondary); background: #E8FFFE; color: var(--secondary); }

  /* Word input */
  .word-entry-area {
    display: flex;
    gap: 10px;
    margin-bottom: 14px;
  }

  .word-entry-area input {
    flex: 1;
    border: 3px solid #E0E0E0;
    border-radius: 14px;
    padding: 14px 18px;
    font-size: 1.1rem;
    font-family: 'Lexend', sans-serif;
    outline: none;
    transition: border-color 0.2s;
  }

  .word-entry-area input:focus { border-color: var(--primary); }

  .add-btn {
    background: var(--primary);
    color: white;
    border: none;
    border-radius: 14px;
    padding: 14px 22px;
    font-size: 1.3rem;
    cursor: pointer;
    transition: transform 0.15s, background 0.2s;
    font-weight: 700;
  }

  .add-btn:hover { transform: scale(1.1); background: #e05555; }

  .words-display {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    min-height: 44px;
  }

  .word-chip {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    border-radius: 50px;
    padding: 8px 16px;
    font-size: 1rem;
    font-weight: 600;
    display: flex;
    align-items: center;
    gap: 8px;
    animation: popIn 0.2s ease;
  }

  @keyframes popIn { from { transform: scale(0.5); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .word-chip button {
    background: rgba(255,255,255,0.3);
    border: none;
    border-radius: 50%;
    width: 22px; height: 22px;
    color: white;
    cursor: pointer;
    font-size: 0.9rem;
    line-height: 1;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .word-chip button:hover { background: rgba(255,255,255,0.5); }

  .word-count-hint {
    font-size: 0.9rem;
    color: #aaa;
    margin-top: 10px;
  }

  .word-count-hint span { color: var(--primary); font-weight: 700; }

  /* Font toggle */
  .font-toggle {
    display: flex;
    gap: 10px;
  }

  .font-btn {
    flex: 1;
    border: 3px solid #E0E0E0;
    background: white;
    border-radius: 14px;
    padding: 14px;
    cursor: pointer;
    font-size: 1rem;
    font-weight: 600;
    color: #555;
    transition: all 0.2s;
  }

  .font-btn:hover { border-color: var(--purple); }
  .font-btn.active { border-color: var(--purple); background: #F3EEFF; color: var(--purple); }
  .font-btn.dyslexic { font-family: 'OpenDyslexic', sans-serif; font-size: 0.9rem; }

  /* Start button */
  .start-btn {
    background: linear-gradient(135deg, #6BCB77, #4ECDC4);
    color: white;
    border: none;
    border-radius: 24px;
    padding: 22px 60px;
    font-size: 1.5rem;
    font-weight: 700;
    font-family: 'Lexend', sans-serif;
    cursor: pointer;
    box-shadow: 0 8px 24px rgba(78,205,196,0.4);
    transition: transform 0.2s, box-shadow 0.2s;
    margin-top: 10px;
    letter-spacing: 0.5px;
  }

  .start-btn:hover { transform: translateY(-3px) scale(1.03); box-shadow: 0 12px 30px rgba(78,205,196,0.5); }
  .start-btn:disabled { background: #ccc; box-shadow: none; cursor: not-allowed; transform: none; }

  /* GAME SCREEN */
  #game {
    display: none;
    flex-direction: column;
    min-height: 100vh;
    padding: 16px;
    background: linear-gradient(180deg, #E8F4FD 0%, #FFF8F0 100%);
  }

  .game-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 16px;
    flex-wrap: wrap;
    gap: 10px;
  }

  .game-title {
    font-size: 1.6rem;
    font-weight: 700;
    color: #333;
  }

  .stats {
    display: flex;
    gap: 12px;
    align-items: center;
  }

  .stat-badge {
    background: white;
    border-radius: 50px;
    padding: 8px 18px;
    font-weight: 700;
    font-size: 1rem;
    box-shadow: 0 3px 10px rgba(0,0,0,0.08);
    display: flex;
    align-items: center;
    gap: 6px;
  }

  .stat-badge.matches { color: var(--green); }
  .stat-badge.flips { color: var(--orange); }

  .back-btn {
    background: white;
    border: 2px solid #E0E0E0;
    border-radius: 50px;
    padding: 8px 18px;
    font-size: 0.95rem;
    font-weight: 600;
    font-family: 'Lexend', sans-serif;
    cursor: pointer;
    color: #666;
    transition: all 0.2s;
  }

  .back-btn:hover { border-color: var(--primary); color: var(--primary); }

  /* CARD GRID */
  #card-grid {
    display: grid;
    gap: clamp(8px, 2vw, 16px);
    flex: 1;
    align-content: start;
    max-width: 900px;
    margin: 0 auto;
    width: 100%;
  }

  /* Cards */
  .card {
    perspective: 1000px;
    cursor: pointer;
    aspect-ratio: 1 / 1.1;
  }

  .card-inner {
    width: 100%; height: 100%;
    position: relative;
    transform-style: preserve-3d;
    transition: transform 0.45s cubic-bezier(0.4, 0, 0.2, 1);
    border-radius: var(--card-radius);
  }

  .card.flipped .card-inner { transform: rotateY(180deg); }

  .card-front, .card-back {
    position: absolute;
    inset: 0;
    border-radius: var(--card-radius);
    backface-visibility: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    box-shadow: var(--shadow);
    user-select: none;
  }

  /* Card BACK (face-down, colorful with graphic) */
  .card-back {
    background: linear-gradient(135deg, #FF6B6B, #FF8E53);
    color: white;
    font-size: clamp(2.5rem, 8vw, 4rem);
    overflow: hidden;
  }

  .card-back::before {
    content: '';
    position: absolute;
    inset: 0;
    background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.2), transparent 60%);
  }

  .card-back .card-graphic {
    font-size: clamp(2.5rem, 8vw, 4rem);
    position: relative;
    z-index: 1;
    animation: float 3s ease-in-out infinite;
  }

  @keyframes float {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-6px); }
  }

  /* Randomize back colors */
  .card:nth-child(2n)   .card-back { background: linear-gradient(135deg, #4ECDC4, #44A08D); }
  .card:nth-child(3n)   .card-back { background: linear-gradient(135deg, #A78BFA, #7C3AED); }
  .card:nth-child(4n)   .card-back { background: linear-gradient(135deg, #FFE66D, #F7931E); }
  .card:nth-child(5n)   .card-back { background: linear-gradient(135deg, #6BCB77, #2ECC71); }

  /* Card FRONT (word shown) */
  .card-front {
    background: white;
    transform: rotateY(180deg);
    padding: 10px;
    gap: 8px;
  }

  .card-front .card-emoji {
    font-size: clamp(2rem, 6vw, 3rem);
    line-height: 1;
  }

  .card-front .card-word {
    font-size: clamp(1rem, 3.5vw, 1.5rem);
    font-weight: 700;
    color: #333;
    text-align: center;
    line-height: 1.2;
    padding: 0 4px;
    word-break: break-word;
  }

  .card-front .card-word.dyslexic-font {
    font-family: 'OpenDyslexic', sans-serif;
    font-size: clamp(0.85rem, 3vw, 1.2rem);
  }

  /* matched state */
  .card.matched .card-front {
    background: linear-gradient(135deg, #E8FFF0, #D0FFE4);
    border: 3px solid var(--green);
  }

  .card.matched .card-inner {
    animation: matchPop 0.4s ease;
  }

  @keyframes matchPop {
    0% { transform: rotateY(180deg) scale(1); }
    50% { transform: rotateY(180deg) scale(1.12); }
    100% { transform: rotateY(180deg) scale(1); }
  }

  /* WIN OVERLAY */
  #win-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(4px);
    z-index: 500;
    align-items: center;
    justify-content: center;
  }

  #win-overlay.show { display: flex; }

  .win-card {
    background: white;
    border-radius: 36px;
    padding: 50px 40px;
    text-align: center;
    max-width: 420px;
    width: 90%;
    box-shadow: 0 30px 80px rgba(0,0,0,0.3);
    animation: winPop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1);
  }

  @keyframes winPop { from { transform: scale(0.3); opacity: 0; } to { transform: scale(1); opacity: 1; } }

  .win-emoji { font-size: 5rem; margin-bottom: 10px; display: block; }
  .win-title { font-size: 2.5rem; font-weight: 700; color: #333; margin-bottom: 8px; }
  .win-subtitle { font-size: 1.2rem; color: #888; margin-bottom: 24px; }
  .win-stats { display: flex; gap: 16px; justify-content: center; margin-bottom: 30px; }

  .win-stat {
    background: #F8F8F8;
    border-radius: 16px;
    padding: 14px 20px;
    font-weight: 700;
    font-size: 1.1rem;
  }

  .win-stat span { font-size: 0.85rem; font-weight: 400; color: #aaa; display: block; }

  .win-btns { display: flex; gap: 12px; justify-content: center; flex-wrap: wrap; }

  .win-btn {
    border: none;
    border-radius: 18px;
    padding: 16px 28px;
    font-size: 1.1rem;
    font-weight: 700;
    font-family: 'Lexend', sans-serif;
    cursor: pointer;
    transition: transform 0.15s;
  }

  .win-btn:hover { transform: scale(1.05); }
  .win-btn.replay { background: linear-gradient(135deg, #6BCB77, #4ECDC4); color: white; }
  .win-btn.new { background: linear-gradient(135deg, #FF6B6B, #FF8E53); color: white; }

</style>
</head>
<body>

<!-- SETUP SCREEN -->
<div id="setup">
  <h1>🌟 Word Match!</h1>
  <p class="subtitle">A fun matching game for young readers</p>

  <!-- Grid Size -->
  <div class="setup-card">
    <h2>🔢 How many cards?</h2>
    <div class="grid-options">
      <button class="grid-btn active" data-pairs="4" data-cols="4">
        <span class="grid-icon">🟦</span>4×2<br><small>8 cards</small>
      </button>
      <button class="grid-btn" data-pairs="6" data-cols="4">
        <span class="grid-icon">🟩</span>3×4<br><small>12 cards</small>
      </button>
      <button class="grid-btn" data-pairs="8" data-cols="4">
        <span class="grid-icon">🟨</span>4×4<br><small>16 cards</small>
      </button>
      <button class="grid-btn" data-pairs="10" data-cols="5">
        <span class="grid-icon">🟧</span>4×5<br><small>20 cards</small>
      </button>
      <button class="grid-btn" data-pairs="12" data-cols="6">
        <span class="grid-icon">🟥</span>4×6<br><small>24 cards</small>
      </button>
    </div>
  </div>

  <!-- Font -->
  <div class="setup-card">
    <h2>🔤 Choose a font</h2>
    <div class="font-toggle">
      <button class="font-btn active" data-font="lexend">Lexend – Easy to read</button>
      <button class="font-btn dyslexic" data-font="dyslexic">OpenDyslexic – Dyslexia friendly</button>
    </div>
  </div>

  <!-- Words -->
  <div class="setup-card">
    <h2>✏️ Your words</h2>
    <div class="word-entry-area">
      <input type="text" id="wordInput" placeholder="Type a word…" maxlength="20" autocomplete="off" autocorrect="off" autocapitalize="none" spellcheck="false">
      <button class="add-btn" id="addWordBtn">+</button>
    </div>
    <div class="words-display" id="wordsDisplay"></div>
    <p class="word-count-hint">Need <span id="wordsNeeded">4</span> words for the selected grid. You have <span id="wordsHave">0</span>.</p>
  </div>

  <button class="start-btn" id="startBtn" disabled>🚀 Start Game!</button>
</div>

<!-- GAME SCREEN -->
<div id="game">
  <div class="game-header">
    <div class="game-title">🌟 Word Match!</div>
    <div class="stats">
      <div class="stat-badge matches">✅ <span id="matchCount">0</span> matches</div>
      <div class="stat-badge flips">🔄 <span id="flipCount">0</span> flips</div>
    </div>
    <button class="back-btn" id="backBtn">⚙️ Setup</button>
  </div>
  <div id="card-grid"></div>
</div>

<!-- WIN OVERLAY -->
<div id="win-overlay">
  <div class="win-card">
    <span class="win-emoji">🏆</span>
    <div class="win-title">You did it!</div>
    <div class="win-subtitle">Amazing memory! 🎉</div>
    <div class="win-stats">
      <div class="win-stat"><span>Flips</span><span id="finalFlips">0</span></div>
      <div class="win-stat"><span>Matches</span><span id="finalMatches">0</span></div>
    </div>
    <div class="win-btns">
      <button class="win-btn replay" id="replayBtn">🔄 Play Again</button>
      <button class="win-btn new" id="newGameBtn">⚙️ New Game</button>
    </div>
  </div>
</div>

<script>
// ── State ──────────────────────────────────────────────────────────────────
const EMOJIS = ['🐶','🐱','🐭','🐹','🐰','🦊','🐻','🐼','🐨','🐯','🦁','🐮','🐷','🐸','🐙','🦋','🌸','🌈','⭐','🍕','🍦','🎈','🎵','🏖','🚀','🦄','🌺','🎨','🍎','🐠','🦜','🌻'];

let words = [];
let selectedPairs = 4;
let selectedCols = 4;
let selectedFont = 'lexend';
let flippedCards = [];
let matchedPairs = 0;
let totalPairs = 0;
let flipCount = 0;
let lockBoard = false;
let gameWords = [];
let gameEmojis = [];

// ── Setup UI ───────────────────────────────────────────────────────────────
const gridBtns = document.querySelectorAll('.grid-btn');
gridBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    gridBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedPairs = +btn.dataset.pairs;
    selectedCols = +btn.dataset.cols;
    updateWordHint();
    validateStart();
  });
});

const fontBtns = document.querySelectorAll('.font-btn');
fontBtns.forEach(btn => {
  btn.addEventListener('click', () => {
    fontBtns.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    selectedFont = btn.dataset.font;
  });
});

const wordInput = document.getElementById('wordInput');
const addWordBtn = document.getElementById('addWordBtn');
const wordsDisplay = document.getElementById('wordsDisplay');

function addWord() {
  const w = wordInput.value.trim();
  if (!w || words.includes(w.toLowerCase())) { wordInput.value=''; return; }
  words.push(w.toLowerCase());
  wordInput.value = '';
  renderWords();
  updateWordHint();
  validateStart();
  wordInput.focus();
}

addWordBtn.addEventListener('click', addWord);
wordInput.addEventListener('keydown', e => { if (e.key === 'Enter') addWord(); });

function renderWords() {
  wordsDisplay.innerHTML = '';
  words.forEach((w, i) => {
    const chip = document.createElement('div');
    chip.className = 'word-chip';
    chip.innerHTML = `${w} <button aria-label="remove">✕</button>`;
    chip.querySelector('button').addEventListener('click', () => {
      words.splice(i, 1);
      renderWords();
      updateWordHint();
      validateStart();
    });
    wordsDisplay.appendChild(chip);
  });
}

function updateWordHint() {
  document.getElementById('wordsNeeded').textContent = selectedPairs;
  document.getElementById('wordsHave').textContent = words.length;
}

function validateStart() {
  document.getElementById('startBtn').disabled = words.length < selectedPairs;
}

document.getElementById('startBtn').addEventListener('click', startGame);

// ── Game Logic ─────────────────────────────────────────────────────────────
function shuffle(arr) {
  const a = [...arr];
  for (let i = a.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [a[i], a[j]] = [a[j], a[i]];
  }
  return a;
}

function startGame() {
  // pick random words if more than needed
  gameWords = shuffle(words).slice(0, selectedPairs);
  // pick random emojis
  gameEmojis = shuffle(EMOJIS).slice(0, selectedPairs);

  flipCount = 0;
  matchedPairs = 0;
  totalPairs = selectedPairs;
  flippedCards = [];
  lockBoard = false;

  document.getElementById('matchCount').textContent = 0;
  document.getElementById('flipCount').textContent = 0;
  document.getElementById('win-overlay').classList.remove('show');

  buildGrid();

  document.getElementById('setup').style.display = 'none';
  document.getElementById('game').style.display = 'flex';
}

function buildGrid() {
  const grid = document.getElementById('card-grid');
  grid.innerHTML = '';

  // responsive columns
  const cols = Math.min(selectedCols, Math.ceil(selectedPairs * 2 / 2));
  grid.style.gridTemplateColumns = `repeat(${cols}, 1fr)`;

  // build pairs: [word, emojiIndex] × 2
  let cardData = [];
  gameWords.forEach((w, i) => {
    cardData.push({ word: w, emoji: gameEmojis[i], id: i });
    cardData.push({ word: w, emoji: gameEmojis[i], id: i });
  });
  cardData = shuffle(cardData);

  cardData.forEach((data, idx) => {
    const card = document.createElement('div');
    card.className = 'card';
    card.dataset.pairId = data.id;

    const isDyslexic = selectedFont === 'dyslexic';
    const wordClass = isDyslexic ? 'card-word dyslexic-font' : 'card-word';

    card.innerHTML = `
      <div class="card-inner">
        <div class="card-back">
          <div class="card-graphic">${data.emoji}</div>
        </div>
       <div class="card-front">
          <div class="${wordClass}">${data.word}</div>
        </div>
      </div>`;

    card.addEventListener('click', () => onCardClick(card));
    grid.appendChild(card);
  });
}

function onCardClick(card) {
  if (lockBoard) return;
  if (card.classList.contains('flipped') || card.classList.contains('matched')) return;

  card.classList.add('flipped');
  flipCount++;
  document.getElementById('flipCount').textContent = flipCount;
  flippedCards.push(card);

  if (flippedCards.length === 2) checkMatch();
}

function checkMatch() {
  lockBoard = true;
  const [a, b] = flippedCards;
  if (a.dataset.pairId === b.dataset.pairId) {
    // Match!
    setTimeout(() => {
      a.classList.add('matched');
      b.classList.add('matched');
      matchedPairs++;
      document.getElementById('matchCount').textContent = matchedPairs;
      flippedCards = [];
      lockBoard = false;
      if (matchedPairs === totalPairs) showWin();
    }, 400);
  } else {
    // No match
    setTimeout(() => {
      a.classList.remove('flipped');
      b.classList.remove('flipped');
      flippedCards = [];
      lockBoard = false;
    }, 1000);
  }
}

function showWin() {
  document.getElementById('finalFlips').textContent = flipCount;
  document.getElementById('finalMatches').textContent = matchedPairs;
  document.getElementById('win-overlay').classList.add('show');
  launchConfetti();
}

function launchConfetti() {
  const colors = ['#FF6B6B','#4ECDC4','#FFE66D','#A78BFA','#6BCB77','#FF9F43'];
  for (let i = 0; i < 80; i++) {
    setTimeout(() => {
      const piece = document.createElement('div');
      piece.className = 'confetti-piece';
      piece.style.left = Math.random() * 100 + 'vw';
      piece.style.background = colors[Math.floor(Math.random() * colors.length)];
      piece.style.animationDuration = (2 + Math.random() * 2) + 's';
      piece.style.animationDelay = Math.random() * 0.5 + 's';
      piece.style.transform = `rotate(${Math.random()*360}deg)`;
      if (Math.random() > 0.5) piece.style.borderRadius = '50%';
      document.body.appendChild(piece);
      setTimeout(() => piece.remove(), 4000);
    }, i * 30);
  }
}

// Buttons
document.getElementById('backBtn').addEventListener('click', () => {
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
});

document.getElementById('replayBtn').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  startGame();
});

document.getElementById('newGameBtn').addEventListener('click', () => {
  document.getElementById('win-overlay').classList.remove('show');
  document.getElementById('game').style.display = 'none';
  document.getElementById('setup').style.display = 'flex';
});

// Init hint
updateWordHint();
</script>
